apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: nyx-hpa
  namespace: nyx-production
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: nyx-server
  minReplicas: 3
  maxReplicas: 20
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 75
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
