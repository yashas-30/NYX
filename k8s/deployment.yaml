apiVersion: apps/v1
kind: Deployment
metadata:
  name: nyx-backend
  labels:
    app: nyx-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nyx-backend
  template:
    metadata:
      labels:
        app: nyx-backend
    spec:
      containers:
      - name: nyx-backend
        image: nyx-backend:latest
        imagePullPolicy: Never # if using local minikube/docker
        ports:
        - containerPort: 3010
        env:
        - name: NODE_ENV
          value: "production"
        - name: RABBITMQ_URL
          value: "amqp://rabbitmq-service:5672"
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "2000m"
        livenessProbe:
          httpGet:
            path: /api/v1/health
            port: 3010
          initialDelaySeconds: 30
          periodSeconds: 10
