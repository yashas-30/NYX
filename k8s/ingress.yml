apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nyx-ingress
  namespace: nyx-production
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  tls:
  - hosts:
    - api.nyx.production
    secretName: nyx-tls
  rules:
  - host: api.nyx.production
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: nyx-service
            port:
              number: 80
