# ──────────────────────────────────────────────────────────────
# SealedSecret: nyx-secrets
# ──────────────────────────────────────────────────────────────
# This file is the Git-safe encrypted equivalent of secret.yml.
# It is created by running:
#
#   kubeseal --format yaml < k8s/secret.yml > k8s/sealed-secret.yml
#
# The Sealed Secrets controller in the cluster decrypts this
# into a regular Secret at apply time.
#
# Prerequisites:
#   helm install sealed-secrets sealed-secrets/sealed-secrets \
#     -n kube-system
#
# To regenerate when secrets rotate:
#   1. Edit k8s/secret.yml with new values
#   2. kubeseal --format yaml < k8s/secret.yml > k8s/sealed-secret.yml
#   3. kubectl apply -f k8s/sealed-secret.yml
#   4. git add k8s/sealed-secret.yml && git commit
#
# The encrypted blob below is cluster-specific.
# After running kubeseal, replace this placeholder block.
# ──────────────────────────────────────────────────────────────
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: nyx-secrets
  namespace: nyx-production
spec:
  encryptedData:
    # kubeseal will populate this block with AES-256-GCM
    # encrypted base64 values tied to the cluster's public key.
    # Example (not real):
    #   NYX_MASTER_KEY: AgAhYmFsb29u...3JhbmRvbVN0dWZmCg==
