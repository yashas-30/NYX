# ──────────────────────────────────────────────────────────────
# Fluent Bit DaemonSet — one pod per K8s node.
#
# Reads NYX container logs from /var/log/containers/ and ships
# them via the output configured in nyx-fluent-bit-config.
#
# Set FLUENT_OUTPUT (e.g. "loki.monitoring.svc.cluster.local")
# to enable remote log aggregation. By default, logs go to
# stdout (viewable via kubectl logs).
# ──────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: nyx-fluent-bit
  namespace: nyx-production
  labels:
    app: nyx-fluent-bit
spec:
  selector:
    matchLabels:
      app: nyx-fluent-bit
  template:
    metadata:
      labels:
        app: nyx-fluent-bit
    spec:
      serviceAccountName: nyx-fluent-bit
      containers:
      - name: fluent-bit
        image: cr.fluentbit.io/fluent/fluent-bit:3.2
        env:
        - name: FLUENT_OUTPUT
          value: ""
        volumeMounts:
        - name: varlog
          mountPath: /var/log
          readOnly: true
        - name: config
          mountPath: /fluent-bit/etc
        - name: varlibdocker
          mountPath: /var/lib/docker/containers
          readOnly: true
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 256Mi
      volumes:
      - name: varlog
        hostPath:
          path: /var/log
      - name: varlibdocker
        hostPath:
          path: /var/lib/docker/containers
      - name: config
        configMap:
          name: nyx-fluent-bit-config
