name: NYX Hardening CI Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  validate:
    name: Lint, Typecheck, and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Codebase
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Project Dependencies
        run: npm ci

      - name: Execute Strict Typecheck & Linter
        run: npm run lint

      - name: Run Vitest Unit Tests
        run: npx vitest run

      - name: Install Tauri Dependencies
        run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev


      - name: Verify Bundle Compilation
        run: npm run build
        env:
          NODE_ENV: production
